<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Certificate Portfolio</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      color: white;
      background: #0b1220;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .note {
      font-size: 13px;
      opacity: 0.82;
    }

    .info-banner {
      padding: 10px 18px;
      font-size: 13px;
      color: white;
      background: #132238;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .viewer-wrap {
      height: calc(100vh - 96px);
      position: relative;
    }

    .viewer {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .toc-button {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 9999;
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #0b1220;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .toc-button:hover {
      background: #132238;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Certificate Portfolio</div>
    <div class="note">View-only portfolio</div>
  </div>

  <div class="info-banner">
    The table of contents is hyperlinked to the certificates for easy navigation.
  </div>

  <div class="viewer-wrap">
    <iframe
      id="pdfViewer"
      class="viewer"
      src="./web/viewer.html?file=../certificate-portfolio.pdf#page=1&zoom=auto&pagemode=none">
    </iframe>
  </div>

  <button class="toc-button" onclick="goToTOC()">Back to Table of Contents</button>

  <script>
    function goToTOC() {
      const viewer = document.getElementById("pdfViewer");
      const targetHash = "#page=2&zoom=auto&pagemode=none";

      try {
        viewer.contentWindow.location.hash = targetHash;
      } catch (e) {
        viewer.src = "./web/viewer.html?file=../certificate-portfolio.pdf" + targetHash;
      }
    }
  </script>
</body>
</html>
