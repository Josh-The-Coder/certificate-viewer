<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Certificate Portfolio</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      color: white;
      background: #0b1220;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .note {
      font-size: 13px;
      opacity: 0.82;
    }

    .info-banner {
      padding: 10px 18px;
      font-size: 13px;
      color: white;
      background: #132238;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    .viewer-wrap {
      height: calc(100vh - 96px);
      position: relative;
    }

    .viewer {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .toc-button,
    .return-button {
      position: fixed;
      bottom: 18px;
      z-index: 9999;
      padding: 10px 14px;
      border-radius: 10px;
      background: #0b1220;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.12);
      text-decoration: none;
      font-family: Arial, sans-serif;
    }

    .toc-button {
      left: 18px;
    }

    .return-button {
      right: 18px;
    }

    .toc-button:hover,
    .return-button:hover {
      background: #132238;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Certificate Portfolio</div>
    <div class="note">View-only portfolio</div>
  </div>

  <div class="info-banner">
    The table of contents is hyperlinked to the certificates for easy navigation.
  </div>

  <div class="viewer-wrap">
    <iframe
      id="pdfViewer"
      class="viewer"
      src="./web/viewer.html?file=../certificate-portfolio.pdf#page=1&zoom=auto&pagemode=none">
    </iframe>
  </div>

  <button class="toc-button" type="button" onclick="goToTOC()">Back to Table of Contents</button>

  <a id="returnButton" class="return-button" href="https://structuredops.com/" target="_self">
    Return to Portfolio
  </a>

  <script>
    const viewerBase = "./web/viewer.html?file=../certificate-portfolio.pdf";
    const allowedReturnUrls = [
      "https://structuredops.com/#certifications",
      "https://structuredops.com/executive-support/#clt-12-certifications"
    ];

    function goToTOC() {
      const viewer = document.getElementById("pdfViewer");
      viewer.src = `${viewerBase}&nav=${Date.now()}#page=2&zoom=auto&pagemode=none`;
    }

    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get("return");
    const returnButton = document.getElementById("returnButton");

    if (allowedReturnUrls.includes(returnUrl)) {
      returnButton.href = returnUrl;
    } else {
      returnButton.href = "https://structuredops.com/";
    }
  </script>
</body>
</html>
